site_name: CornerStone PDK
docs_dir: docs
site_dir: build/pdf
nav:
  - Home: index.md
  - Reference:
      - Cells Si220 Cband: cells_si220_cband.md
      - Cells Si220 Oband: cells_si220_oband.md
      - Cells Si500: cells_si500.md
      - Cells Sin300: cells_sin300.md
      - Changelog: changelog.md
plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_toc_entry: false
            show_source: false
  - with-pdf:
      author: GDSFactory
      cover_subtitle: Photonics Process Design Kit
      output_path: ../../docs.pdf
theme:
  name: material
  logo: logo.png
