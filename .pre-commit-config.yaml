# Canonical pre-commit config for GDSFactory PDK repos.
#
# All hooks (PDK checks + third-party tools) are defined in pdk-ci-workflow.
# Versions of third-party tools are controlled centrally via
# additional_dependencies — no per-repo version pinning needed.
#
# CI: fetched automatically by the reusable test_code.yml workflow.
# Local: download via `make dev` or copy this file to your repo root.
#
# PDK repos needing custom overrides (e.g. check-yaml exclude) can add
# per-hook settings below without changing this file's single-repo structure.

repos:
  - repo: https://github.com/doplaydo/pdk-ci-workflow
    rev: main
    hooks:
      # PDK structure validation
      - id: check-required-files
      - id: check-pyproject-sections
      - id: check-package-init
      - id: check-version-sync
      - id: check-cells-structure
      - id: check-tech-structure
      - id: check-pdk-object
      - id: check-test-structure
      - id: check-makefile-targets
      - id: check-workflows
      - id: check-multi-band
      - id: check-no-raw-layers
      - id: check-no-main-in-cells
      - id: check-precommit-config
      # Code quality (versions controlled by pdk-ci-workflow)
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
      - id: ruff-lint
      - id: ruff-format
      - id: nbstripout
      - id: codespell
      - id: pretty-format-toml
